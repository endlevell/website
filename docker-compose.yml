services:
  app:
    build: .
    env_file: .env
    restart: unless-stopped
    volumes:
      - ./data:/app/data
      - ./public/uploads:/app/public/uploads
    expose:
      - "4321"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app

volumes:
  caddy_data:
  caddy_config:
